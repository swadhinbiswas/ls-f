name: Bug Report
description: Report a bug in ls-f
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: ls-f version
      description: "Output of `lsf --version`"
      placeholder: "lsf 5.0.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Run `lsf --git -l`
        2. ...
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Actual Output
      description: Paste the terminal output (use a code block)
      render: text

  - type: textarea
    id: expected
    attributes:
      label: Expected Output
      description: What you expected to see
