name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for ls-f? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include CLI examples if applicable.
      placeholder: |
        `lsf --new-flag` should do X...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New flag / option
        - Output formatting
        - Performance
        - Documentation
        - Other
