version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
    commit-message:
      prefix: "ci"
    ignore:
      # dtolnay/rust-toolchain uses the git tag as the Rust version
      # (e.g. @1.74 installs Rust 1.74), NOT as the action version.
      # Dependabot incorrectly treats it as a semver bump.
      - dependency-name: "dtolnay/rust-toolchain"
