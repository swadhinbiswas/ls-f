name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Run all checks before building/publishing
  checks:
    name: Pre-release Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Verify version matches tag
        run: |
          tag="${GITHUB_REF##*/}"
          version="v$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[0].version')"
          if [[ "$tag" != "$version" ]]; then
            echo "::error::Tag $tag does not match Cargo.toml version $version"
            exit 1
          fi
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --verbose
      - run: cargo publish --dry-run

  # Publish to crates.io
  publish:
    name: Publish to crates.io
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Build Rust binaries for multiple platforms
  build:
    name: Build (${{ matrix.target }})
    needs: checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: lsf-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: lsf-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: lsf-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: lsf-macos-aarch64

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/lsf dist/${{ matrix.artifact }}
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz*

  # Create GitHub release with all binary artifacts
  release:
    name: Create GitHub Release
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          ref="${GITHUB_REF##*/}"
          echo "tag=$ref" >> "$GITHUB_OUTPUT"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p dist
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) -exec cp {} dist/ \;
          ls -la dist/

      - name: Generate release notes
        id: notes
        run: |
          if [[ -f RELEASE_NOTES.md ]]; then
            echo 'notes<<EOF' >> $GITHUB_OUTPUT
            cat RELEASE_NOTES.md >> $GITHUB_OUTPUT
            echo 'EOF' >> $GITHUB_OUTPUT
          else
            cat > /tmp/notes.md << 'NOTES'
          ## Install

          ### From crates.io (recommended)
          ```sh
          cargo install lsf
          ```

          ### From binary
          Download the appropriate binary for your platform below and place it in your `$PATH`.

          | Platform | File |
          |----------|------|
          | Linux x86_64 | `lsf-linux-x86_64.tar.gz` |
          | Linux aarch64 | `lsf-linux-aarch64.tar.gz` |
          | macOS x86_64 | `lsf-macos-x86_64.tar.gz` |
          | macOS aarch64 (Apple Silicon) | `lsf-macos-aarch64.tar.gz` |
          NOTES
            echo 'notes<<EOF' >> $GITHUB_OUTPUT
            cat /tmp/notes.md >> $GITHUB_OUTPUT
            echo 'EOF' >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: dist/*
